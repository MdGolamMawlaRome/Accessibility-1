name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.4'

    - name: Generate Gradle Wrapper
      run: gradle wrapper --gradle-version 8.4

    - name: Decode Keystore File
      env:
        ENCRYPTED_KEYSTORE: ${{ secrets.KEYSTORE_BASE64 }}
      run: |
        mkdir -p app
        echo "$ENCRYPTED_KEYSTORE" | base64 --decode > app/app_keystore.jks

    - name: Make Gradle Executable
      run: chmod +x gradlew

    - name: Build with Gradle Wrapper
      env:
        KEYSTORE_PATH: "app_keystore.jks"
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: ./gradlew assembleRelease --no-daemon

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SmartAccessibility-Signed-APK
        path: "app/build/outputs/apk/release/*.apk"
